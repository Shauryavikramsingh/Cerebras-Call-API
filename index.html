<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Shaurya Vikram Singh | AI Developer & Cerebras Specialist</title>
    <meta name="title" content="Shaurya Vikram Singh | AI Developer" />
    <meta name="description" content="Portfolio of Shaurya Vikram Singh. Specializing in high-speed AI inference, decentralized protocols, and asset management visualization." />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shaurya Vikram Singh | AI & Cerebras Explorer" />
    <meta property="og:description" content="Exploring ultra-fast AI inference and decentralized asset management protocols." />

    <!-- Performance & Accuracy Protocols -->
    <meta name="theme-color" content="#000000" />

    <style>
      /* Initial loading and error styles to prevent layout shift */
      #fallback-ui {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 50;
        background: #020617;
        color: #f8fafc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .error-icon { color: #ef4444; margin-bottom: 1rem; }
    </style>
  </head>
  <body class="bg-slate-950 text-white">
    <div id="root">
      <!-- Minimalist loading state before React hydrates -->
      <div id="loader" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #020617;">
        <div style="width: 40px; height: 40px; border: 3px solid #1e293b; border-top-color: #3b82f6; border-radius: 50%; animate: spin 1s linear infinite;"></div>
      </div>
    </div>

    <!-- Script to handle global Cerebras fetch failures -->
    <script>
      window.addEventListener('error', function(e) {
        if (e.message.toLowerCase().includes('cerebras') || e.message.toLowerCase().includes('fetch')) {
          const root = document.getElementById('root');
          root.innerHTML = `
            <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #020617; color: #94a3b8; font-family: sans-serif;">
              <h1 style="color: white; margin-bottom: 8px;">Inference Connection Error</h1>
              <p>Shaurya's Protocol: Failed to get response from Cerebras.</p>
              <button onclick="window.location.reload()" style="margin-top: 20px; padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer;">Retry Connection</button>
            </div>
          `;
        }
      });
    </script>

    <script type="module" src="/src/main.tsx"></script>
    
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </body>
</html>
